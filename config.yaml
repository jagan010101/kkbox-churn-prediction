# Central configuration for the KKBox churn/forward-revenue project.
# Every constant that was previously hard-coded across notebooks 02-06 lives here;
# src/kkbox code reads from this file via kkbox.config.load_config().
#
# Naming note: the revenue target is called "forward revenue" (fwd_rev_59d),
# not "LTV" - a 59-day window is two billing cycles of observed revenue, not
# a customer's lifetime value. See project_report.md section 3.2 for
# the full argument.

labels:
  # Forward-revenue window length (days): two ~30-day billing cycles, so a
  # single missed/late renewal doesn't zero out the target. Matches the
  # original 2017-01-01..2017-02-28 span used before this became config-driven,
  # but that's a coincidence of the Kaggle data's span, not the reason for 59 -
  # see project_report.md section 3.2 for the two-billing-cycle argument.
  fwd_rev_window_days: 59
  # KKBox's own churn definition: no renewal transaction within this many days
  # of a subscription's expiry counts as churn.
  churn_grace_days: 30
  # Trailing listening-activity window (days) ending at each user's ref_date.
  engagement_window_days: 30
  # Last date covered by transactions.parquet / user_logs.parquet.
  global_max_date: "2017-02-28"
  # Only real (actual_amount_paid > 0) transactions establish a user's ref_date -
  # free-trial-only signups don't count as a subscription cycle to churn from.
  require_paid_ref_cycle: true

# NOTE: not currently read by any notebook or src/kkbox module (verified: no
# cfg["preprocessing"] reference anywhere) - 02_Feature_Engineering.ipynb defines
# its own CATEGORICAL_COLS/SCALE_COLS/UNSCALED_NUMERICAL_COLS inline instead, and
# has grown from the 9-numerical-column set below to 23 across two feature passes
# since this section was written. Left here as historical/reference config rather
# than deleted, but do not assume it reflects the current feature set.
preprocessing:
  categorical_cols: [city, gender, registered_via, payment_method_id]
  embedding_dims:
    city: 5
    gender: 2
    registered_via: 3
    payment_method_id: 8
  scale_cols:
    - bd_clean
    - registration_tenure_days
    - avg_payment_plan_days
    - avg_actual_amount_paid
    - num_transactions
    - total_secs_log
    - daily_active_days
  unscaled_numerical_cols: [is_auto_renew_rate, avg_song_completion]
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15

model:
  fm_k: 8
  backbone_dims: [256, 128, 64]
  dropouts: [0.3, 0.3, 0.2]
  head_hidden_dim: 32

training:
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 2048
  epochs: 50
  patience: 10
  lr_scheduler_patience: 5
  lr_scheduler_factor: 0.5
  grad_clip_norm: 1.0

seeds:
  default: 42
  multiseed: [0, 1, 2, 3, 4]

paths:
  processed_dir: data/processed
  models_dir: models
  results_dir: results
  raw_dir: data/raw
